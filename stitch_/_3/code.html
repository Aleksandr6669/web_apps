<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df259",
                        "background-light": "#f5f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-primary/10">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Распознавание еды</h1>
<div class="size-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 max-w-md mx-auto w-full pb-32">
<!-- Food Photo Section -->
<div class="p-4">
<div class="relative group">
<div class="w-full aspect-square rounded-xl overflow-hidden shadow-lg bg-slate-200 dark:bg-slate-800" data-alt="Healthy bowl with avocado, salmon and rice" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAtibmi9GERYBABTJ5ZiOo0w-6VJO6d94aWX9_DzI4_4nkXetqRbpbrhwQd1fjMSwWK3wjj9fG2hU1khFSuUFI0YTD3P4Z0NEUd0udXl1GV63e_z6y7S_PCcDBS97ROCa8qQ9-zgennqVwGXYMfKGtWTmYrvwyV7gPpCUE90aEQ16pfynFIKTfxtN06NI4vlgoa5dQ54xcGyuLkkuuz8-uhb6HFQ0vHTjW3bV7OZ46-ccvIqeecl1nO1hhi0d-MkCEJQZV3dCyBXiI'); background-size: cover; background-position: center;">
</div>
<div class="absolute bottom-4 right-4 bg-white/90 dark:bg-slate-900/90 p-2 rounded-full shadow-md">
<span class="material-symbols-outlined text-primary">camera_alt</span>
</div>
</div>
</div>
<!-- Identification Label -->
<div class="px-4 py-2">
<span class="text-xs font-bold uppercase tracking-wider text-primary">ИИ Определил</span>
<div class="flex items-center gap-2 mt-1">
<h2 class="text-2xl font-bold">Салат с лососем и авокадо</h2>
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
</div>
<!-- Editable Dish Name Field -->
<div class="px-4 py-4">
<label class="block text-sm font-medium mb-1.5 opacity-70">Название блюда</label>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-800 border border-primary/20 rounded-lg h-14 px-4 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="Боул с лососем и авокадо"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/60">edit</span>
</div>
</div>
<!-- Nutritional Info Grid -->
<div class="px-4 py-4 grid grid-cols-4 gap-3">
<div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/10 text-center shadow-sm">
<p class="text-[10px] uppercase font-bold text-primary mb-1">Ккал</p>
<p class="text-lg font-bold">452</p>
</div>
<div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/10 text-center shadow-sm">
<p class="text-[10px] uppercase font-bold text-blue-500 mb-1">Белки</p>
<p class="text-lg font-bold">24г</p>
</div>
<div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/10 text-center shadow-sm">
<p class="text-[10px] uppercase font-bold text-orange-500 mb-1">Жиры</p>
<p class="text-lg font-bold">18г</p>
</div>
<div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/10 text-center shadow-sm">
<p class="text-[10px] uppercase font-bold text-purple-500 mb-1">Угл.</p>
<p class="text-lg font-bold">48г</p>
</div>
</div>
<!-- Weight Selection (Mockup for detail) -->
<div class="px-4 py-2">
<div class="flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-xl border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">scale</span>
<span class="font-medium">Вес порции</span>
</div>
<div class="flex items-center gap-2">
<span class="font-bold">350г</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</div>
</div>
<!-- Favorites Toggle -->
<div class="px-4 py-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-pink-500">favorite</span>
<span class="font-medium">Добавить в избранное</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</main>
<!-- Bottom Actions & Navigation -->
<div class="fixed bottom-[88px] left-0 right-0 z-40">
<div class="max-w-md mx-auto px-4">
<button class="w-full bg-primary text-slate-900 font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_task</span>
            Сохранить в дневник
        </button>
</div>
</div><nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-2 pb-6 pt-2 z-50">
<div class="max-w-md mx-auto flex items-center justify-around">
<a class="flex flex-col items-center gap-1 p-2 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Дневник</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Рецепты</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Анализ</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Профиль</span>
</a>
</div>
</nav></body></html>
