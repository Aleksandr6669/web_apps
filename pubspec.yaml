name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Theming
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  material_symbols_icons: ^4.2906.0
  percent_indicator: ^4.2.3
  go_router: ^13.2.0 # Added go_router

  # Functionality
  image_picker: ^1.0.7
  http: ^1.2.0
  flutter_dotenv: ^5.1.0

  # Firebase & AI (for future use)
  firebase_ai: ^0.1.0 # Corrected version
  fl_chart: ^1.1.1
  intl: ^0.20.2
  table_calendar: ^3.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
